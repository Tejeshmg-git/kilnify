<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Broken Pot</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        clay: {
                            500: '#B35C44',
                            600: '#9E4A35',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        artistic: ['Poppins', 'sans-serif']
                    },
                    screens: {
                        'xs': '380px',
                        'sm': '640px',
                        'md': '768px',
                        'lg': '1024px',
                        'xl': '1280px',
                        '2xl': '1536px',
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Apply saved settings instantly to prevent flicker
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        if (localStorage.getItem('dir') === 'rtl') document.documentElement.dir = 'rtl';
    </script>
    <style>
        h1, h2, h3, h4, h5 { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="font-sans bg-stone-50 dark:bg-stone-950 text-stone-900 dark:text-white flex items-center justify-center min-h-screen relative overflow-x-hidden transition-colors duration-300">

    <div class="absolute top-6 left-6 xs:top-8 xs:left-8 md:top-12 md:left-12 z-20">
        <a href="index.html" class="flex items-center gap-2 md:gap-3 group">
            <div class="w-10 h-10 md:w-14 md:h-14 bg-white rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg shadow-black/5 overflow-hidden p-1 md:p-1.5 transition-transform group-hover:scale-110">
                <img src="assets/logo.png" alt="Kilnify Logo" class="w-full h-full object-contain scale-125">
            </div>
            <span class="text-sm md:text-2xl font-artistic tracking-widest text-clay-500 font-bold uppercase transition-all">KILNIFY</span>
        </a>
    </div>

    <!-- Global Toggles -->
    <div class="fixed top-6 right-6 xs:top-8 xs:right-8 md:top-12 md:right-12 z-[100] flex flex-col gap-3">
        <button onclick="toggleTheme()" id="theme-toggle" class="p-3 md:p-4 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-stone-200 dark:border-white/10 rounded-2xl shadow-xl hover:scale-110 transition-all text-stone-600 dark:text-stone-300">
            <i data-lucide="moon" class="dark:hidden w-5 h-5"></i>
            <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
        </button>
        <button onclick="toggleRTL()" class="p-3 md:p-4 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-stone-200 dark:border-white/10 rounded-2xl shadow-xl hover:scale-110 transition-all text-stone-600 dark:text-stone-300">
            <i data-lucide="languages" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- 404 Content -->
    <div class="text-center px-4 xs:px-6 w-full max-w-4xl overflow-hidden">
        <div class="relative inline-block mb-8 md:mb-12">
            <h1 class="text-6xl xs:text-[10rem] md:text-[14rem] font-artistic font-black leading-none opacity-10 select-none text-stone-900 dark:text-white tracking-[0.2em]">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                 <i data-lucide="ghost" class="w-16 h-16 xs:w-20 xs:h-20 md:w-32 md:h-32 text-clay-500 animate-bounce"></i>
            </div>
        </div>
        
        <h2 class="text-2xl xs:text-3xl md:text-5xl font-artistic font-bold mb-6 leading-tight text-stone-900 dark:text-white">Looks Like a Crack in the Potter's Wheel</h2>
        <p class="text-stone-500 dark:text-stone-400 mb-10 md:mb-12 max-w-md mx-auto text-sm md:text-base leading-relaxed">
            The page you're looking for was either dropped, broken, or never fired properly. Let's get you back to the studio
        </p>
        
        <div class="flex flex-col xs:flex-row justify-center gap-4">
            <a href="index.html" class="bg-clay-500 text-white px-8 py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-clay-600 transition-all shadow-xl shadow-clay-500/20 active:scale-95 text-center">Back to Home</a>
            <a href="sessions.html" class="px-8 py-4 rounded-2xl font-bold border-2 border-stone-200 dark:border-stone-800 hover:border-clay-500 hover:text-clay-500 transition-all uppercase tracking-widest text-xs text-center text-stone-700 dark:text-stone-300">Explore Sessions</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
