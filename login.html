<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kilnify Studio</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        clay: { 
                            500: '#B35C44',
                            600: '#9E4A35'
                        } 
                    },
                    fontFamily: { 
                        sans: ['Outfit', 'sans-serif'], 
                        artistic: ['Syne', 'sans-serif'] 
                    },
                    screens: {
                        'xs': '380px',
                        'sm': '640px',
                        'md': '768px',
                        'lg': '1024px',
                        'xl': '1280px',
                        '2xl': '1536px',
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Apply saved settings instantly to prevent flicker
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        if (localStorage.getItem('dir') === 'rtl') document.documentElement.dir = 'rtl';
    </script>
    <style>
        .premium-text {
            background: linear-gradient(to bottom, #1c1917 30%, #44403c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .premium-text {
            background: linear-gradient(to bottom, #ffffff 30%, #d6d6d6 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .accent-text {
            background: linear-gradient(135deg, #B35C44 0%, #E28468 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-stone-100 dark:bg-stone-950 text-stone-900 dark:text-white min-h-screen flex items-center justify-center relative py-20 px-4 md:px-8 transition-colors duration-500 overflow-x-hidden">

    <!-- Premium Background Overlay -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,_#B35C441a_0%,_transparent_50%)]"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_100%,_#B35C440d_0%,_transparent_50%)]"></div>
    </div>

    <div class="absolute top-6 left-6 xs:top-8 xs:left-8 md:top-12 md:left-12 z-20">
        <a href="index.html" class="flex items-center gap-2 md:gap-3 group">
            <div class="w-10 h-10 md:w-14 md:h-14 bg-white rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg shadow-black/5 overflow-hidden p-1 md:p-1.5 transition-transform group-hover:scale-110">
                <img src="assets/logo.png" alt="Kilnify Logo" class="w-full h-full object-contain scale-125">
            </div>
            <span class="text-sm md:text-2xl font-artistic tracking-widest text-clay-500 font-bold uppercase transition-all">KILNIFY</span>
        </a>
    </div>

    <!-- Global Toggles -->
    <div class="fixed top-6 right-6 xs:top-8 xs:right-8 md:top-12 md:right-12 z-[100] flex flex-col gap-3">
        <button onclick="toggleTheme()" id="theme-toggle" class="p-3 md:p-4 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-stone-200 dark:border-white/10 rounded-2xl shadow-xl hover:scale-110 transition-all text-stone-600 dark:text-stone-300">
            <i data-lucide="moon" class="dark:hidden w-5 h-5"></i>
            <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
        </button>
        <button onclick="toggleRTL()" class="p-3 md:p-4 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl border border-stone-200 dark:border-white/10 rounded-2xl shadow-xl hover:scale-110 transition-all text-stone-600 dark:text-stone-300">
            <i data-lucide="languages" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Login Card -->
    <main class="relative z-10 w-full max-w-md mx-auto">
        <div class="bg-white/80 dark:bg-stone-900/40 backdrop-blur-3xl border border-stone-200 dark:border-white/10 rounded-[2.5rem] md:rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden transition-all duration-500">
            <!-- Glass Glow Decoration -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-[#B35C44] rounded-full blur-[100px] opacity-20"></div>
            
            <div class="text-center mb-8 md:mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-[#B35C44] rounded-2xl text-white mb-6 shadow-lg shadow-[#B35C44]/20">
                    <i data-lucide="shield-check" class="w-7 h-7 md:w-8 md:h-8"></i>
                </div>
                <h1 class="text-3xl md:text-5xl font-artistic font-extrabold mb-3 leading-tight premium-text">
                    Welcome <span class="accent-text italic">Back</span>
                </h1>
                <p class="text-stone-400 text-xs md:text-sm font-medium">Sign in to your secure artisan portal</p>
            </div>

            <form class="space-y-5 md:space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-stone-500 dark:text-stone-400 ms-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-stone-400 dark:text-stone-500"></i>
                        <input type="email" placeholder="artisan@kilnify.com" class="w-full bg-white dark:bg-white/5 border border-stone-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-[#B35C44] focus:ring-1 focus:ring-[#B35C44] transition-all text-sm md:text-base text-stone-900 dark:text-white">
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-stone-500 dark:text-stone-400">Password</label>
                        <a href="#" class="text-[10px] md:text-xs font-bold text-[#B35C44] hover:underline transition-all">Forgot?</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-stone-400 dark:text-stone-500"></i>
                        <input type="password" placeholder="••••••••" class="w-full bg-white dark:bg-white/5 border border-stone-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-12 outline-none focus:border-[#B35C44] focus:ring-1 focus:ring-[#B35C44] transition-all text-sm md:text-base text-stone-900 dark:text-white">
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 hover:text-clay-500 transition-colors">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-3 px-1 py-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded-lg border-stone-300 text-[#B35C44] focus:ring-[#B35C44]">
                    <label for="remember" class="text-[11px] md:text-xs font-bold text-stone-400 uppercase tracking-widest select-none cursor-pointer">Remember this device</label>
                </div>

                <button class="w-full bg-[#B35C44] text-white py-4 md:py-5 rounded-2xl font-black text-xs md:text-sm uppercase tracking-[0.2em] shadow-lg shadow-[#B35C44]/20 hover:bg-[#9E4A35] transition-all flex items-center justify-center gap-3 active:scale-95">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    Sign In
                </button>
            </form>

            <div class="mt-8 md:mt-10">
                <div class="relative flex items-center justify-center mb-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-stone-200 dark:border-white/5"></div>
                    </div>
                    <span class="relative px-4 bg-white dark:bg-stone-900/30 text-[10px] font-black uppercase tracking-[0.2em] text-stone-400">Or continue with</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-3 py-3 md:py-4 border border-stone-200 dark:border-white/10 rounded-2xl hover:border-clay-500 transition-all group">
                        <i data-lucide="fingerprint" class="w-5 h-5 text-stone-400 group-hover:text-clay-500"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-stone-500 group-hover:text-stone-900 dark:group-hover:text-white">Biometric</span>
                    </button>
                    <button class="flex items-center justify-center gap-3 py-3 md:py-4 border border-stone-200 dark:border-white/10 rounded-2xl hover:border-clay-500 transition-all group">
                        <i data-lucide="smartphone" class="w-5 h-5 text-stone-400 group-hover:text-clay-500"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-stone-500 group-hover:text-stone-900 dark:group-hover:text-white">2FA Code</span>
                    </button>
                </div>
            </div>

            <p class="mt-8 md:mt-12 text-center text-xs text-stone-500 dark:text-stone-400 font-medium">
                New to the studio? <a href="register.html" class="text-[#B35C44] font-bold hover:underline">Create an Account</a>
            </p>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
